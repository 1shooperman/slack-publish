_metadata:
  major_version: 1
  minor_version: 1
display_information:
  name: Markdown Publisher Bot
  description: Publish markdown files to channels as formatted Slack messages.
  background_color: "#1A1D21"
features:
  bot_user:
    display_name: Markdown Publisher
    always_online: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - channels:read
      - groups:read
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
